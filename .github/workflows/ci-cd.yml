name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: 22i0789/prepai-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://${{ secrets.EC2_PUBLIC_IP }}:30000
            NEXT_PUBLIC_AUTH_URL=http://${{ secrets.EC2_PUBLIC_IP }}:30001

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: 22i0789/prepai-backend:${{ github.sha }}

      - name: Build and Push Auth Service
        uses: docker/build-push-action@v4
        with:
          context: ./auth-service
          push: true
          tags: 22i0789/prepai-auth-service:${{ github.sha }}

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update Kustomization
        run: |
          cd k8s
          kustomize edit set image 22i0789/prepai-frontend=22i0789/prepai-frontend:${{ github.sha }}
          kustomize edit set image 22i0789/prepai-backend=22i0789/prepai-backend:${{ github.sha }}
          kustomize edit set image 22i0789/prepai-auth-service=22i0789/prepai-auth-service:${{ github.sha }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git commit -am "Update image tags to ${{ github.sha }} [skip ci]"
          git push
