apiVersion: apps/v1
kind: Deployment
metadata:
  name: prepai-frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 22i0789/prepai-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://localhost:30000"
            - name: NEXT_PUBLIC_AUTH_URL
              value: "http://localhost:30001"
